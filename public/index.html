<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,800;1,6..72,300;1,6..72,400&family=Bricolage+Grotesque:opsz,wght@12..96,200;12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080709;
      --surface:    #111019;
      --surface2:   #1b1924;
      --border:     #2b2838;
      --accent:     #c8823e;
      --accent2:    #9b3a52;
      --success:    #4a8a5b;
      --warn:       #c8a030;
      --text:       #ede5d8;
      --muted:      #7a7285;
      --r:          5px;
      --font-ui:    'Bricolage Grotesque', sans-serif;
      --font-story: 'Newsreader', Georgia, serif;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 55% at 15% 10%, #1c0f1a 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 85% 90%, #080e1c 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: rgba(8,7,9,.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 62px; position: sticky; top: 0; z-index: 200;
    }
    .logo {
      font-family: var(--font-story);
      font-size: 1.65rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.5px;
    }
    .logo em { font-style: italic; font-weight: 300; color: var(--accent); }
    .logo span { color: var(--muted); font-size: 1.65rem; font-weight: 800; }
    nav { display: flex; gap: 2px; }
    nav button {
      background: none; border: none; color: var(--muted);
      padding: .38rem 1rem; border-radius: var(--r);
      font-size: .72rem; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
      cursor: pointer; transition: color .2s, background .2s;
      font-family: var(--font-ui);
    }
    nav button:hover { background: var(--surface2); color: var(--text); }
    nav button.active { background: var(--accent); color: #fff; }
    .auth-area { display: flex; align-items: center; gap: .6rem; }
    .username-chip {
      font-size: .72rem; font-weight: 700; letter-spacing: .3px;
      color: var(--muted); background: var(--surface2);
      padding: .3rem .9rem; border-radius: 99px; border: 1px solid var(--border);
    }

    /* ── Layout ──────────────────────────────── */
    main { max-width: 860px; margin: 0 auto; padding: 3rem 1.5rem; }

    /* ── Buttons ─────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .55rem 1.3rem; border: none; border-radius: var(--r);
      font-size: .72rem; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
      cursor: pointer; transition: opacity .15s, transform .1s;
      font-family: var(--font-ui);
    }
    .btn:hover { opacity: .82; transform: translateY(-1px); }
    .btn:active { transform: none; }
    .btn-primary { background: var(--accent);  color: #fff; }
    .btn-danger  { background: var(--accent2); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm      { padding: .28rem .75rem; font-size: .68rem; }
    .btn-icon {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: .4rem 1rem; border-radius: var(--r);
      font-size: .7rem; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
      cursor: pointer; transition: .15s; display: inline-flex; align-items: center; gap: .3rem;
      font-family: var(--font-ui);
    }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }
    .btn-icon.voted { border-color: var(--accent); color: var(--accent); background: rgba(200,130,62,.1); }

    /* ── Cards / Forms ───────────────────────── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 2rem; margin-bottom: 1.4rem; }
    h2 { font-family: var(--font-story); font-size: 1.7rem; font-weight: 800; margin-bottom: 1.4rem; letter-spacing: -.5px; }
    .field { margin-bottom: 1.2rem; }
    label { display: block; font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .9px; margin-bottom: .45rem; }
    input[type=text], input[type=password], textarea, select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r);
      color: var(--text); font-size: .97rem; padding: .65rem 1rem; outline: none;
      font-family: var(--font-story); transition: border-color .2s, box-shadow .2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,130,62,.1); }
    textarea { resize: vertical; min-height: 200px; line-height: 1.75; }
    .hint { font-size: .71rem; color: var(--muted); margin-top: .35rem; }
    .error-msg { color: var(--accent2); font-size: .8rem; margin-top: .5rem; }

    /* ── Story cards ─────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .story-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 1.4rem 1.6rem; margin-bottom: .7rem; cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      animation: fadeUp .4s ease both;
    }
    .story-card:nth-child(1)  { animation-delay: .00s; }
    .story-card:nth-child(2)  { animation-delay: .04s; }
    .story-card:nth-child(3)  { animation-delay: .08s; }
    .story-card:nth-child(4)  { animation-delay: .12s; }
    .story-card:nth-child(5)  { animation-delay: .16s; }
    .story-card:nth-child(6)  { animation-delay: .20s; }
    .story-card:nth-child(7)  { animation-delay: .24s; }
    .story-card:nth-child(8)  { animation-delay: .28s; }
    .story-card:nth-child(9)  { animation-delay: .32s; }
    .story-card:nth-child(10) { animation-delay: .36s; }
    .story-card:hover { border-color: var(--accent); box-shadow: 0 4px 28px rgba(200,130,62,.09); }
    .sc-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: .45rem; }
    .sc-header h3 { font-family: var(--font-story); font-size: 1.25rem; font-weight: 800; letter-spacing: -.2px; line-height: 1.25; }
    .sc-meta { font-size: .71rem; color: var(--muted); margin-bottom: .55rem; letter-spacing: .2px; }
    .sc-excerpt { font-family: var(--font-story); font-size: .97rem; color: var(--muted); line-height: 1.65; font-style: italic; }
    .sc-footer { display: flex; align-items: center; gap: .75rem; margin-top: .85rem; flex-wrap: wrap; }
    .genre-badge {
      font-size: .63rem; font-weight: 700; letter-spacing: .9px; text-transform: uppercase;
      padding: .18rem .62rem; border-radius: 99px; background: transparent;
      color: var(--accent); border: 1px solid var(--accent); white-space: nowrap; flex-shrink: 0;
    }
    .stat { font-size: .72rem; color: var(--muted); display: flex; align-items: center; gap: .2rem; }

    /* ── Chips ───────────────────────────────── */
    .chips { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .5rem; }
    .chip { display: inline-flex; align-items: center; gap: .25rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: .18rem .65rem; font-size: .69rem; letter-spacing: .2px; }
    .chip.trigger { border-color: var(--accent2); color: var(--accent2); }
    .chip button { background: none; border: none; cursor: pointer; color: inherit; font-size: .8rem; line-height: 1; opacity: .7; }
    .chip button:hover { opacity: 1; }

    /* ── Search bar ──────────────────────────── */
    .search-row { display: flex; gap: .6rem; margin-bottom: .9rem; flex-wrap: wrap; }
    .search-row input { flex: 1; min-width: 180px; }
    .results-meta { font-size: .72rem; color: var(--muted); margin-bottom: 1rem; letter-spacing: .2px; }

    /* ── Highlight ───────────────────────────── */
    mark { background: rgba(200,130,62,.22); color: var(--accent); border-radius: 2px; padding: 0 2px; }

    /* ── Empty ───────────────────────────────── */
    .empty { text-align: center; padding: 4.5rem 1rem; color: var(--muted); }
    .empty .icon { font-size: 2.8rem; margin-bottom: .8rem; }

    /* ── Reader ──────────────────────────────── */
    .reader-back { margin-bottom: 1.5rem; }
    .reader-header { margin-bottom: 2.2rem; }
    .reader-header h1 {
      font-family: var(--font-story);
      font-size: 3rem; font-weight: 800; line-height: 1.15; margin-bottom: .6rem; letter-spacing: -.8px;
    }
    .reader-header .meta { color: var(--muted); font-size: .78rem; letter-spacing: .2px; }
    .reader-actions { display: flex; gap: .6rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
    .reader-body {
      font-family: var(--font-story);
      font-size: 1.18rem; line-height: 2.05; color: #d5ccbf; white-space: pre-wrap; word-break: break-word;
    }

    /* ── Comments ────────────────────────────── */
    .comments-section { margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 2.2rem; }
    .comments-section h3 { font-family: var(--font-story); font-size: 1.25rem; font-weight: 800; margin-bottom: 1.3rem; letter-spacing: -.3px; }
    .comment { background: var(--surface2); border-radius: var(--r); padding: 1rem 1.2rem; margin-bottom: .7rem; border-left: 2px solid var(--border); }
    .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
    .comment-author { font-size: .72rem; font-weight: 700; color: var(--accent); letter-spacing: .3px; }
    .comment-date   { font-size: .68rem; color: var(--muted); }
    .comment-body   { font-family: var(--font-story); font-size: .97rem; line-height: 1.65; }
    .comment-form { margin-top: 1.4rem; }
    .comment-form textarea { min-height: 90px; margin-bottom: .6rem; }

    /* ── Manage table ────────────────────────── */
    .manage-row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface2); border-radius: var(--r); padding: .9rem 1.2rem; margin-bottom: .5rem; gap: 1rem;
      border-left: 2px solid var(--border); transition: border-color .2s;
    }
    .manage-row:hover { border-left-color: var(--accent); }
    .manage-row .info h4 { font-family: var(--font-story); font-size: .95rem; font-weight: 600; margin-bottom: .18rem; }
    .manage-row .info p  { font-size: .7rem; color: var(--muted); }
    .manage-row .actions { display: flex; gap: .5rem; flex-shrink: 0; }

    /* ── Admin ───────────────────────────────── */
    .admin-tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; }
    .admin-tab {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: .35rem 1rem; border-radius: var(--r);
      font-size: .7rem; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
      cursor: pointer; transition: .15s; font-family: var(--font-ui);
    }
    .admin-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Modal ───────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; z-index: 500;
    }
    .modal-backdrop.hidden { display: none; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 2.2rem; width: min(420px, 90vw);
      box-shadow: 0 32px 80px rgba(0,0,0,.65);
    }
    .modal-tabs { display: flex; gap: 4px; margin-bottom: 1.6rem; }
    .modal-tab {
      flex: 1; background: none; border: 1px solid var(--border); color: var(--muted);
      padding: .4rem; border-radius: var(--r);
      font-size: .7rem; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
      cursor: pointer; transition: .15s; font-family: var(--font-ui);
    }
    .modal-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .modal-title { font-family: var(--font-story); font-size: 1.5rem; font-weight: 800; margin-bottom: 1.4rem; letter-spacing: -.4px; }

    /* ── Toast ───────────────────────────────── */
    #toast {
      position: fixed; bottom: 1.8rem; right: 1.8rem; padding: .65rem 1.3rem; border-radius: var(--r);
      font-size: .7rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s; transform: translateY(8px); z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { background: var(--success); color: #fff; }
    #toast.err { background: var(--accent2); color: #fff; }

    /* ── Multi-step submit ───────────────────── */
    .step-progress { display: flex; align-items: flex-start; margin-bottom: 2.2rem; }
    .step-item { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
    .step-item + .step-item::before { content: ''; position: absolute; top: 13px; right: 50%; left: -50%; height: 1px; background: var(--border); }
    .step-item.done + .step-item::before { background: var(--accent); }
    .step-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 700; position: relative; z-index: 1; margin-bottom: .4rem; transition: .2s; }
    .step-item.active .step-dot { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 4px rgba(200,130,62,.14); }
    .step-item.done .step-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step-label { font-size: .62rem; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--muted); text-align: center; line-height: 1.3; }
    .step-item.active .step-label { color: var(--text); }
    .step-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; }
    .step-heading { font-family: var(--font-story); font-size: 2rem; font-weight: 800; margin-bottom: .5rem; letter-spacing: -.6px; }
    .step-desc { color: var(--muted); font-family: var(--font-story); font-size: 1.02rem; line-height: 1.7; margin-bottom: 1.6rem; font-style: italic; }

    /* ── Story sections ──────────────────────── */
    .story-section { border-radius: var(--r); padding: 1.5rem 1.6rem; margin-bottom: 1rem; }
    .section-label { font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: .9rem; display: flex; align-items: center; gap: .4rem; }
    .darkness-section { background: rgba(155,58,82,.08); border: 1px solid rgba(155,58,82,.22); }
    .darkness-section .section-label { color: #c04a68; }
    .light-section { background: rgba(200,160,48,.08); border: 1px solid rgba(200,160,48,.2); }
    .light-section .section-label { color: #c8a030; }
    .searching-section { background: rgba(200,130,62,.08); border: 1px solid rgba(200,130,62,.2); }
    .searching-section .section-label { color: var(--accent); }

    /* ── Light toggle ────────────────────────── */
    .light-toggle { display: flex; gap: .5rem; margin-bottom: 1.4rem; }
    .toggle-opt {
      flex: 1; padding: .8rem .5rem; border-radius: var(--r);
      border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
      font-size: .7rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      cursor: pointer; transition: .2s; text-align: center; font-family: var(--font-ui);
    }
    .toggle-opt:hover { border-color: var(--accent); color: var(--text); }
    .toggle-opt.sel-found { border-color: #c8a030; color: #c8a030; background: rgba(200,160,48,.09); }
    .toggle-opt.sel-searching { border-color: var(--accent); color: var(--accent); background: rgba(200,130,62,.09); }

    /* ── Mode selection cards ────────────────── */
    .mode-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0; }
    .mode-card {
      background: var(--surface2); border: 2px solid var(--border); border-radius: var(--r);
      padding: 2rem 1.5rem; cursor: pointer; transition: border-color .2s, box-shadow .2s; text-align: center;
    }
    .mode-card:hover { border-color: var(--accent); box-shadow: 0 4px 28px rgba(200,130,62,.1); }
    .mode-card h3 { font-family: var(--font-story); font-size: 1.15rem; font-weight: 800; margin-bottom: .4rem; }
    .mode-card p  { font-size: .8rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
    .mode-icon { font-size: 2rem; margin-bottom: .75rem; }
    .mode-features { text-align: left; font-size: .76rem; color: var(--muted); line-height: 2; list-style: none; padding: 0; margin: 0 0 1.2rem; }
    @media (max-width: 520px) { .mode-cards { grid-template-columns: 1fr; } }

    /* ── Tag suggestions ─────────────────────── */
    .tag-suggest { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .55rem; }
    .tag-chip {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 99px;
      padding: .2rem .65rem; font-size: .69rem; cursor: pointer; color: var(--muted);
      transition: border-color .15s, color .15s; font-family: var(--font-ui);
    }
    .tag-chip:hover  { border-color: var(--accent); color: var(--text); }
    .tag-chip.on { border-color: var(--accent); color: var(--accent); background: rgba(200,130,62,.1); }

    /* ── Disclaimer / anonymous blocks ──────── */
    .disclaimer-box {
      background: rgba(200,130,62,.06); border: 1px solid rgba(200,130,62,.2);
      border-radius: var(--r); padding: 1rem 1.2rem; margin-bottom: 1rem;
      font-size: .8rem; color: var(--muted); line-height: 1.65;
    }
    .anon-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.2rem; margin-top: .6rem; }
    .word-count-row { font-size: .7rem; color: var(--muted); text-align: right; margin-top: .3rem; }
    .tip-box { background: rgba(200,130,62,.07); border: 1px solid rgba(200,130,62,.18); border-radius: var(--r); padding: .75rem 1rem; font-size: .8rem; color: var(--muted); margin-bottom: 1.4rem; line-height: 1.6; }

    /* ── Series ──────────────────────────────── */
    .series-badge {
      font-size: .63rem; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
      padding: .18rem .62rem; border-radius: 99px;
      color: #a08be0; border: 1px solid #a08be0;
      background: rgba(160,139,224,.08); white-space: nowrap; flex-shrink: 0;
    }
    .tbc-chip {
      font-size: .63rem; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
      padding: .18rem .62rem; border-radius: 99px;
      color: var(--warn); border: 1px solid var(--warn);
      background: rgba(200,160,48,.08); white-space: nowrap; flex-shrink: 0;
    }
    .series-nav {
      border-top: 1px solid var(--border);
      margin-top: 2.5rem; padding-top: 1.6rem;
    }
    .series-nav-label {
      font-size: .63rem; font-weight: 700; letter-spacing: .9px; text-transform: uppercase;
      color: var(--muted); margin-bottom: .75rem;
    }
    .series-parts { display: flex; flex-wrap: wrap; gap: .5rem; }
    .series-part-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .45rem 1rem; border-radius: var(--r);
      border: 1px solid var(--border); background: var(--surface2);
      font-size: .75rem; font-family: var(--font-ui); cursor: pointer;
      transition: border-color .2s, background .2s; color: var(--text);
    }
    .series-part-btn:hover { border-color: #a08be0; background: rgba(160,139,224,.08); }
    .series-part-btn.current { border-color: #a08be0; background: rgba(160,139,224,.12); color: #a08be0; cursor: default; }
    .series-part-btn.tbc-placeholder { border-style: dashed; color: var(--muted); cursor: default; pointer-events: none; }
    .tbc-banner {
      margin-top: 1.5rem;
      padding: .85rem 1.1rem;
      background: rgba(200,160,48,.07); border: 1px solid rgba(200,160,48,.2);
      border-radius: var(--r); font-size: .82rem; color: var(--warn); line-height: 1.6;
    }
    .series-toggle-row {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: .8rem; cursor: pointer;
      font-size: .86rem; color: var(--muted); font-weight: 400; letter-spacing: 0; text-transform: none;
    }
    .series-fields { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.2rem; margin-top: .4rem; }

    /* ── Welcome banner ──────────────────────── */
    .welcome-wrap {
      min-height: calc(100vh - 62px);
      display: flex; align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
    }
    .welcome-card {
      max-width: 680px; width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 3.2rem 3.4rem;
      box-shadow: 0 40px 100px rgba(0,0,0,.55);
      animation: fadeUp .6s ease both;
    }
    .welcome-word {
      font-family: var(--font-story);
      font-size: 3.8rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      margin-bottom: .5rem;
      background: linear-gradient(135deg, var(--accent) 0%, #e8b87a 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome-def {
      font-family: var(--font-story);
      font-size: .85rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 2rem;
      letter-spacing: .2px;
    }
    .welcome-body {
      font-family: var(--font-story);
      font-size: 1.08rem;
      line-height: 1.9;
      color: #cfc7bb;
      margin-bottom: 1.6rem;
    }
    .welcome-disclaimer {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.7;
      padding: .9rem 1.1rem;
      background: rgba(200,130,62,.05);
      border: 1px solid rgba(200,130,62,.15);
      border-radius: var(--r);
      margin-bottom: 2.2rem;
    }
    .welcome-disclaimer strong { color: var(--accent); }
    .welcome-ctas {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .welcome-cta {
      display: flex; flex-direction: column; align-items: center;
      gap: .5rem;
      padding: 1.5rem 1.2rem;
      border-radius: var(--r);
      border: 2px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      font-family: var(--font-ui);
    }
    .welcome-cta:hover {
      border-color: var(--accent);
      box-shadow: 0 6px 32px rgba(200,130,62,.12);
      transform: translateY(-2px);
    }
    .welcome-cta .cta-icon { font-size: 1.8rem; }
    .welcome-cta .cta-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .9px;
      text-transform: uppercase; color: var(--accent);
    }
    .welcome-cta .cta-desc {
      font-size: .79rem; color: var(--muted); text-align: center; line-height: 1.5;
    }
    @media (max-width: 520px) {
      .welcome-card { padding: 2rem 1.4rem; }
      .welcome-word { font-size: 2.8rem; }
      .welcome-ctas { grid-template-columns: 1fr; }
    }

    /* ── Print (PDF export) ──────────────────── */
    @media print {
      header, .reader-back, .reader-actions, .comments-section, #toast, .modal-backdrop { display: none !important; }
      body { background: #fff; color: #000; }
      main { max-width: 100%; padding: 0; }
      .card { border: none; padding: 0; }
      .reader-header h1 { color: #000; }
      .reader-header .meta { color: #555; }
      .reader-body { color: #111; font-size: 12pt; line-height: 1.8; }
    }

    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      main { padding: 1.8rem 1rem; }
      .reader-header h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><em>Story</em><span>Lab</span></div>
  <nav id="nav">
    <button onclick="go('browse')" data-page="browse" class="active">Browse</button>
    <button onclick="go('submit')" data-page="submit">Submit</button>
    <button onclick="go('mine')"   data-page="mine">My Stories</button>
  </nav>
  <div class="auth-area" id="authArea"></div>
</header>

<main id="app"></main>

<div id="modal" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchAuthTab('login')">Login</button>
      <button class="modal-tab"        onclick="switchAuthTab('register')">Register</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────
let token    = localStorage.getItem('sl_token');
let user     = JSON.parse(localStorage.getItem('sl_user') || 'null');
let page     = 'browse';
let readerId = null;
let triggers = JSON.parse(localStorage.getItem('sl_triggers') || '[]');
let searchQ  = '';
let authTab      = 'login';
let adminTab     = 'users';
let adminUserQ   = '';
let adminUserPage = 1;
let modTab       = 'browse';
let browsePage   = 1;
let submitMode  = null; // null | 'easy' | 'guided'
let submitDraft = {
  step: 1, title: '', genre: '', tags: '',
  challenge: '', feeling: '', helped: '', advice: '',
  light_status: 'searching',
  story: '',
  anon: false, anon_name: '', captcha_a: 0, captcha_b: 0,
  comments_disabled: false,
  in_series: false, series_name: '', series_part: '', tbc: false,
};
let editingStoryId = null;
let resetToken     = null;

const COMMON_TAGS = ['grief','healing','recovery','hope','loss','trauma','anxiety','depression','sobriety','family','abuse','childhood','relationships','divorce','loneliness','growth','faith','strength','resilience','addiction','self-worth','forgiveness'];
const CATEGORIES  = ['Trauma','Addiction','Depression','Injury','Recovery','Relationship','Family','Friendship','Other'];
const DISCLAIMER  = `By submitting your story, you confirm you are the author and grant StoryLab a non-exclusive licence to display and store your story on this platform. Your story may be read by visitors to this site. You can delete your story at any time from the My Stories page.`;

// ── API client ────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body)  opts.body = JSON.stringify(body);
  const res  = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── Navigation ────────────────────────────────────────────
function go(p) {
  page     = p;
  readerId = null;
  if (p !== 'submit') { editingStoryId = null; submitMode = null; }
  render();
}

function render() {
  renderHeader();
  switch (page) {
    case 'welcome': renderWelcome(); break;
    case 'browse': renderBrowse(); break;
    case 'submit': renderSubmit(); break;
    case 'mine':   renderMine();   break;
    case 'admin':  renderAdmin();  break;
    case 'mod':    renderMod();    break;
    case 'reset':  renderReset();  break;
  }
}

function renderHeader() {
  // Nav active state
  document.querySelectorAll('nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });

  // Mod tab
  const modBtn = document.querySelector('nav button[data-page=mod]');
  const isMod  = user?.is_admin || (user?.mod_level || 0) >= 1;
  if (isMod && !modBtn) {
    const btn = document.createElement('button');
    btn.textContent = 'Moderation';
    btn.dataset.page = 'mod';
    btn.onclick = () => go('mod');
    const adminBtnRef = document.querySelector('nav button[data-page=admin]');
    if (adminBtnRef) document.getElementById('nav').insertBefore(btn, adminBtnRef);
    else document.getElementById('nav').appendChild(btn);
  } else if (!isMod && modBtn) {
    modBtn.remove();
  }
  if (modBtn) modBtn.classList.toggle('active', page === 'mod');

  // Admin tab
  const adminBtn = document.querySelector('nav button[data-page=admin]');
  if (user?.is_admin && !adminBtn) {
    const btn = document.createElement('button');
    btn.textContent = 'Admin';
    btn.dataset.page = 'admin';
    btn.onclick = () => go('admin');
    document.getElementById('nav').appendChild(btn);
  } else if (!user?.is_admin && adminBtn) {
    adminBtn.remove();
  }
  if (adminBtn) adminBtn.classList.toggle('active', page === 'admin');

  // Auth area
  const area = document.getElementById('authArea');
  if (user) {
    const badge = user.is_admin ? ' ⚡' : (user.mod_level === 2 ? ' ★' : (user.mod_level === 1 ? ' ◈' : ''));
    area.innerHTML = `
      <span class="username-chip">${esc(user.username)}${badge}</span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>`;
  } else {
    area.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openModal()">Login / Register</button>`;
  }
}

// ── Helpers ───────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q) {
  if (!q) return esc(text);
  let out = esc(text);
  q.trim().split(/\s+/).filter(Boolean).forEach(w => {
    out = out.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), m => `<mark>${m}</mark>`);
  });
  return out;
}

function readingTime(body) {
  const wc = body.trim().split(/\s+/).length;
  const mins = Math.max(1, Math.ceil(wc / 200));
  return `${mins} min read`;
}

function fmtDate(dt) {
  return new Date(dt).toLocaleDateString('en-GB', { year:'numeric', month:'short', day:'numeric' });
}

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2800);
}

// ── Welcome ───────────────────────────────────────────────
function renderWelcome() {
  document.getElementById('app').innerHTML = `
    <div class="welcome-wrap">
      <div class="welcome-card">
        <div class="welcome-word">Oyming</div>
        <div class="welcome-def">/ oy·ming / — to move forward, in some kind of way, towards a better future</div>

        <p class="welcome-body">I built this site for people to share their story of how they moved forward from a dark point in their life. Hopefully these stories can reach someone still in darkness and give them some kind of hope or ideas to come to their own state of oyming.<br><br>So please, share your story with us — whether you have found your hope or not. Maybe someone will read your story and have some kind words of encouragement or advice.</p>

        <div class="welcome-disclaimer">
          <strong>Disclaimer:</strong> Advice given is not guaranteed or from any professional source. Just people helping people. Please report any negative or harmful comments or stories.
        </div>

        <div class="welcome-ctas">
          <div class="welcome-cta" onclick="seenWelcome();go('browse')">
            <span class="cta-icon">📖</span>
            <span class="cta-label">Read</span>
            <span class="cta-desc">Browse stories from people who have walked through darkness</span>
          </div>
          <div class="welcome-cta" onclick="seenWelcome();go('submit')">
            <span class="cta-icon">✍️</span>
            <span class="cta-label">Share</span>
            <span class="cta-desc">Tell your story — someone out there needs to hear it</span>
          </div>
        </div>
      </div>
    </div>`;
}

function seenWelcome() {
  localStorage.setItem('sl_seen', '1');
}

// ── Browse ────────────────────────────────────────────────
async function renderBrowse() {
  if (readerId) { await renderReader(readerId); return; }

  const app = document.getElementById('app');

  // Only build the search controls once; preserve them on subsequent calls
  if (!document.getElementById('browseShell')) {
    app.innerHTML = `
      <div id="browseShell">
        <div class="card">
          <h2 style="margin-bottom:1rem">Search Stories</h2>
          <div class="search-row">
            <input type="text" id="searchInput" placeholder="Search by keyword, title or author…">
            <button class="btn btn-ghost" id="clearSearchBtn">Clear</button>
          </div>
          <div class="field" style="margin-bottom:0">
            <label>Trigger word filters — hide stories containing:</label>
            <div class="search-row" style="margin-bottom:.4rem">
              <input type="text" id="triggerInput" placeholder="Type a word and press Enter…">
              <button class="btn btn-danger" id="addTriggerBtn">Add Filter</button>
            </div>
            <div class="hint">Any story containing one of these words will be hidden from results.</div>
            <div id="trigChipsArea" class="chips" style="margin-top:.6rem"></div>
          </div>
        </div>
        <div id="browseResults"></div>
      </div>`;

    document.getElementById('searchInput').value = searchQ;

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQ = e.target.value;
      browsePage = 1;
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => updateBrowseResults(true), 400);
    });
    document.getElementById('clearSearchBtn').addEventListener('click', () => {
      searchQ = '';
      browsePage = 1;
      document.getElementById('searchInput').value = '';
      updateBrowseResults(true);
    });
    document.getElementById('triggerInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTrigger();
    });
    document.getElementById('addTriggerBtn').addEventListener('click', addTrigger);
  }

  await updateBrowseResults();
}

async function updateBrowseResults(reset = true) {
  const resultsEl = document.getElementById('browseResults');
  if (!resultsEl) return;

  if (reset) browsePage = 1;

  const trigChipsArea = document.getElementById('trigChipsArea');
  if (trigChipsArea) {
    trigChipsArea.innerHTML = triggers.length
      ? triggers.map((t,i) => `<span class="chip trigger">${esc(t)}<button onclick="removeTrigger(${i})">✕</button></span>`).join('')
      : '<span style="font-size:.75rem;color:var(--muted)">None active</span>';
  }

  try {
    const params = new URLSearchParams();
    if (searchQ) params.set('q', searchQ);
    if (triggers.length) params.set('triggers', triggers.join(','));
    params.set('page', browsePage);
    params.set('limit', '20');
    const { stories, total, pages } = await api('/api/stories?' + params);

    const cards = stories.map(s => storyCard(s)).join('');
    const loadMoreBtn = browsePage < pages
      ? `<button class="btn btn-ghost" style="width:100%;margin-top:.75rem" onclick="loadMoreStories()">Load more stories (${total - browsePage * 20} remaining)</button>`
      : '';

    if (reset) {
      const empty = total === 0
        ? `<div class="empty"><div class="icon">📭</div><div>${searchQ ? 'No stories match your search.' : 'No stories yet — be the first to submit one!'}</div></div>`
        : '';
      resultsEl.innerHTML = `
        <div class="results-meta" id="browseResultsMeta">${total} stor${total===1?'y':'ies'}${searchQ ? ` matching "<strong>${esc(searchQ)}</strong>"` : ''}${triggers.length ? ` · ${triggers.length} filter${triggers.length>1?'s':''} active` : ''}</div>
        <div id="storyCards">${cards || empty}</div>
        <div id="loadMoreArea">${loadMoreBtn}</div>`;
    } else {
      document.getElementById('storyCards').insertAdjacentHTML('beforeend', cards);
      document.getElementById('loadMoreArea').innerHTML = loadMoreBtn;
    }
  } catch(e) {
    if (reset) resultsEl.innerHTML = `<div class="empty"><div class="icon">⚠️</div><div>Could not load stories: ${esc(e.message)}</div></div>`;
  }
}

async function loadMoreStories() {
  browsePage++;
  await updateBrowseResults(false);
}

function storyCard(s, clickable = true) {
  const excerpt = s.body.length > 160 ? s.body.slice(0,160).trim()+'…' : s.body;
  const tagChips = s.tags?.length ? s.tags.map(t => `<span class="chip">${highlight(t, searchQ)}</span>`).join('') : '';
  return `
    <div class="story-card" ${clickable ? `onclick="openStory('${s.id}')"` : ''}>
      <div class="sc-header">
        <h3>${highlight(s.title, searchQ)}</h3>
        ${s.genre ? `<span class="genre-badge">${esc(s.genre)}</span>` : ''}
      </div>
      <div class="sc-meta">by ${highlight(s.author_name, searchQ)} · ${fmtDate(s.created_at)} · ${readingTime(s.body)}</div>
      <div class="sc-excerpt">${highlight(excerpt, searchQ)}</div>
      <div class="sc-footer">
        <span class="stat">▲ ${s.votes}</span>
        <span class="stat">💬 ${s.comment_count}</span>
        ${s.light ? `<span class="chip" style="${s.light_status==='found' ? 'border-color:#f0b450;color:#f0b450' : 'border-color:var(--accent);color:var(--accent)'}">${s.light_status==='found' ? '🌅 Light found' : '🔍 Searching'}</span>` : '<span class="chip">🌑 Darkness only</span>'}
        ${s.series_name ? `<span class="series-badge">📚 ${esc(s.series_name)}${s.series_part ? ` · Part ${s.series_part}` : ''}</span>` : ''}
        ${s.tbc ? `<span class="tbc-chip">↻ To Be Continued</span>` : ''}
        ${tagChips}
      </div>
    </div>`;
}

function addTrigger() {
  const input = document.getElementById('triggerInput');
  const val = input?.value.trim().toLowerCase();
  if (!val || triggers.includes(val)) { if(input) input.value=''; return; }
  triggers.push(val);
  localStorage.setItem('sl_triggers', JSON.stringify(triggers));
  if(input) input.value = '';
  updateBrowseResults(true);
}

function removeTrigger(i) {
  triggers.splice(i, 1);
  localStorage.setItem('sl_triggers', JSON.stringify(triggers));
  updateBrowseResults(true);
}

// ── Reader ────────────────────────────────────────────────
async function openStory(id) {
  readerId = id;
  await renderReader(id);
}

async function renderReader(id) {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="reader-back"><button class="btn btn-ghost" onclick="readerId=null;renderBrowse()">← Back to stories</button></div><div id="readerShell"><div class="empty"><div class="icon">⏳</div><div>Loading…</div></div></div>`;

  try {
    const [s, comments] = await Promise.all([
      api(`/api/stories/${id}`),
      api(`/api/stories/${id}/comments`),
    ]);

    // Fetch series parts if this story belongs to one
    let seriesParts = [];
    if (s.series_name && s.author_id) {
      try {
        seriesParts = await api(`/api/series?name=${encodeURIComponent(s.series_name)}&author_id=${encodeURIComponent(s.author_id)}`);
      } catch {}
    }

    const votedClass = s.user_voted ? 'voted' : '';
    const tagChips = s.tags?.length ? s.tags.map(t => `<span class="chip">${esc(t)}</span>`).join('') : '';

    const commentsHtml = comments.length
      ? comments.map(c => `
          <div class="comment" id="comment-${c.id}">
            <div class="comment-header">
              <span class="comment-author">${esc(c.username)}</span>
              <span style="display:flex;align-items:center;gap:.5rem">
                <span class="comment-date">${fmtDate(c.created_at)}</span>
                ${user && user.id !== c.user_id ? `<button class="btn btn-ghost btn-sm" style="color:var(--accent2);border-color:var(--accent2)" onclick="reportComment('${c.id}')">⚑</button>` : ''}
                ${isModerator() && user.id !== c.user_id ? `<button class="btn btn-ghost btn-sm" style="color:#e96479;border-color:#e96479" onclick="modFlagContent('comment','${c.id}','comment')">🚩</button>` : ''}
                ${(user && (user.id === c.user_id || user.is_admin)) ? `<button class="btn btn-danger btn-sm" onclick="deleteComment('${c.id}','${s.id}')">Delete</button>` : ''}
              </span>
            </div>
            <div class="comment-body">${esc(c.body)}</div>
          </div>`).join('')
      : '<div style="color:var(--muted);font-size:.85rem">No comments yet.</div>';

    const commentForm = s.comments_disabled
      ? `<div style="color:var(--muted);font-size:.85rem;padding:.75rem 0;border-top:1px solid var(--border)">Comments are disabled on this story.</div>`
      : `<div class="comment-form">
           ${!user ? `<input type="text" id="anonName" placeholder="Your name (optional — leave blank to post as Anonymous)" style="margin-bottom:.6rem">` : ''}
           <textarea id="commentInput" placeholder="Write a comment…"></textarea>
           <button class="btn btn-primary" onclick="postComment('${s.id}')">Post Comment</button>
         </div>`;

    document.getElementById('readerShell').innerHTML = `
      <div class="card">
        <div class="reader-header">
          <h1>${esc(s.title)}</h1>
          <div class="meta">by ${esc(s.author_name)} · ${s.genre || 'Uncategorised'} · ${fmtDate(s.created_at)} · ${readingTime(s.body)}</div>
          ${tagChips ? `<div class="chips" style="margin-top:.6rem">${tagChips}</div>` : ''}
        </div>

        <div class="reader-actions">
          <button class="btn-icon ${votedClass}" id="voteBtn" onclick="toggleVote('${s.id}')">
            ▲ <span id="voteCount">${s.votes}</span> upvote${s.votes===1?'':'s'}
          </button>
          <button class="btn-icon" onclick="exportTxt('${s.id}')">⬇ Save as TXT</button>
          <button class="btn-icon" onclick="window.print()">🖨 Save as PDF</button>
          ${user && user.id !== s.author_id ? `<button class="btn-icon" onclick="reportStory('${s.id}')" style="margin-left:auto;color:var(--accent2);border-color:var(--accent2)">⚑ Report</button>` : ''}
          ${isModerator() && user.id !== s.author_id ? `<button class="btn-icon" onclick="modFlagContent('story','${s.id}',${JSON.stringify(esc(s.title))})" style="color:#e96479;border-color:#e96479">🚩 Flag</button>` : ''}
        </div>

        ${s.mode === 'quick' ? `
        <div class="reader-body">${esc(s.darkness || s.body)}</div>
        ` : `
        <div class="story-section darkness-section">
          <div class="section-label">🌑 The Darkness</div>
          <div class="reader-body">${esc(s.darkness || s.body)}</div>
        </div>
        ${s.light ? `
        <div class="story-section ${s.light_status === 'found' ? 'light-section' : 'searching-section'}">
          <div class="section-label">${s.light_status === 'found' ? '🌅 The Light' : '🔍 Still Searching'}</div>
          <div class="reader-body">${esc(s.light)}</div>
        </div>` : ''}`}

        ${s.tbc ? `<div class="tbc-banner">↻ <strong>To Be Continued</strong> — the author plans to add more to this story.</div>` : ''}

        ${seriesParts.length > 1 ? `
        <div class="series-nav">
          <div class="series-nav-label">📚 Series — ${esc(s.series_name)}</div>
          <div class="series-parts">
            ${seriesParts.map(p => `
              <button class="series-part-btn ${p.id === s.id ? 'current' : ''}"
                ${p.id !== s.id ? `onclick="openStory('${p.id}')"` : ''}>
                ${p.series_part ? `Part ${p.series_part} — ` : ''}${esc(p.title)}
              </button>`).join('')}
            ${seriesParts[seriesParts.length - 1].tbc ? `<span class="series-part-btn tbc-placeholder">Part ${(seriesParts[seriesParts.length - 1].series_part || seriesParts.length) + 1} — Coming soon…</span>` : ''}
          </div>
        </div>` : ''}

        <div class="comments-section">
          ${s.comments_disabled
            ? `<div style="color:var(--muted);font-size:.85rem;padding:.5rem 0">Comments are disabled on this story.</div>`
            : `<h3>Comments (${comments.length})</h3>
               <div id="commentsList">${commentsHtml}</div>
               ${commentForm}`}
        </div>
      </div>`;

    // Store story data for export
    window._readerStory = s;
  } catch(e) {
    document.getElementById('readerShell').innerHTML = `<div class="empty"><div class="icon">⚠️</div><div>${esc(e.message)}</div></div>`;
  }
}

async function toggleVote(storyId) {
  if (!user) { openModal(); return; }
  try {
    const { voted } = await api(`/api/stories/${storyId}/vote`, 'POST');
    const btn   = document.getElementById('voteBtn');
    const count = document.getElementById('voteCount');
    const cur   = parseInt(count.textContent);
    count.textContent = voted ? cur + 1 : cur - 1;
    btn.classList.toggle('voted', voted);
  } catch(e) { toast(e.message, 'err'); }
}

async function reportStory(storyId) {
  if (!user) { openModal(); return; }
  const reason = prompt('Why are you reporting this story? (optional)');
  if (reason === null) return;
  try {
    await api(`/api/stories/${storyId}/report`, 'POST', { reason });
    toast('Story reported. Thank you — an admin will review it.');
  } catch(e) { toast(e.message === 'Already reported' ? 'You have already reported this story.' : e.message, 'err'); }
}

async function reportComment(commentId) {
  if (!user) { openModal(); return; }
  const reason = prompt('Why are you reporting this comment? (optional)');
  if (reason === null) return;
  try {
    await api(`/api/comments/${commentId}/report`, 'POST', { reason });
    toast('Comment reported. Thank you — an admin will review it.');
  } catch(e) { toast(e.message === 'Already reported' ? 'You have already reported this comment.' : e.message, 'err'); }
}

async function postComment(storyId) {
  const input = document.getElementById('commentInput');
  const body  = input.value.trim();
  if (!body) return;
  const anon_name = document.getElementById('anonName')?.value.trim() || '';
  try {
    const c = await api(`/api/stories/${storyId}/comments`, 'POST', { body, anon_name });
    const list = document.getElementById('commentsList');
    const noMsg = list.querySelector('div');
    if (noMsg && noMsg.style.color) noMsg.remove();
    list.insertAdjacentHTML('beforeend', `
      <div class="comment" id="comment-${c.id}">
        <div class="comment-header">
          <span class="comment-author">${esc(c.username)}</span>
          <span style="display:flex;align-items:center;gap:.5rem">
            <span class="comment-date">Just now</span>
            <button class="btn btn-danger btn-sm" onclick="deleteComment('${c.id}','${storyId}')">Delete</button>
          </span>
        </div>
        <div class="comment-body">${esc(c.body)}</div>
      </div>`);
    input.value = '';
    toast('Comment posted!');
  } catch(e) { toast(e.message, 'err'); }
}

async function deleteComment(commentId, storyId) {
  if (!confirm('Delete this comment?')) return;
  try {
    await api(`/api/comments/${commentId}`, 'DELETE');
    document.getElementById(`comment-${commentId}`)?.remove();
    toast('Comment deleted.');
  } catch(e) { toast(e.message, 'err'); }
}

function exportTxt(id) {
  const s = window._readerStory;
  if (!s) return;
  const content = `${s.title}\nby ${s.author_name} · ${fmtDate(s.created_at)}\n${'─'.repeat(40)}\n\n${s.body}`;
  const blob = new Blob([content], { type: 'text/plain' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: `${s.title.replace(/[^a-z0-9]/gi,'_')}.txt` });
  a.click();
}

  if (editingStoryId) { submitMode = 'guided'; renderGuidedStep(); return; }
  if (submitMode === 'easy')    { renderEasyForm(); return; }
  if (submitMode === 'guided') {
    if (!user) {
      document.getElementById('app').innerHTML = `
        <div class="empty"><div class="icon">🔒</div>
          <div>Guided Mode requires an account so you can manage your story later.</div><br>

        </div>`;
      return;
    }
    renderGuidedStep();
    return;
  }
  renderModeSelect();
}

}

// ── Easy Mode ─────────────────────────────────────────────
function renderEasyForm() {
  const s = submitDraft;
  if (!s.captcha_a) { s.captcha_a = Math.floor(Math.random()*12)+1; s.captcha_b = Math.floor(Math.random()*12)+1; }
  const catOpts = CATEGORIES.map(g => `<option ${s.genre===g?'selected':''}>${g}</option>`).join('');
  const tagChips = COMMON_TAGS.map(t => {
    const on = s.tags.split(',').map(x=>x.trim()).includes(t);
    return `<button type="button" class="tag-chip ${on?'on':''}" onclick="toggleTag('${t}','easy')">${t}</button>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="card" style="max-width:660px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem">
        <button class="btn btn-ghost btn-sm" onclick="submitMode=null;render()">← Back</button>
        <h2 style="margin:0;font-size:1.4rem">⚡ Quick Share</h2>
      </div>

      <div class="field"><label>Title *</label>
        <input type="text" id="easyTitle" placeholder="What would you call your story?" value="${esc(s.title)}">
      </div>
      <div class="field"><label>Category</label>
        <select id="easyGenre"><option value="">— Select a category —</option>${catOpts}</select>
      </div>
      <div class="field">
        <label>Your Story *</label>
        <textarea id="easyStory" placeholder="Share what you've been through… 100–200 words is a great length, but write as much or as little as you need." style="min-height:240px" oninput="easyWC()">${esc(s.story)}</textarea>
        <div class="word-count-row" id="easyWCRow">0 words</div>
        <div class="hint">Write freely — there is no minimum or maximum.</div>
      </div>

      <div class="field">
        <label>Tags <span style="font-weight:400;text-transform:none">(comma-separated)</span></label>
        <input type="text" id="easyTags" placeholder="e.g. grief, recovery, hope" value="${esc(s.tags)}" oninput="refreshTagChips('easy')">
        <div class="hint">Add tags to help others find your story.</div>
        <div style="font-size:.63rem;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin:.7rem 0 .3rem">Click to add a suggestion</div>
        <div class="tag-suggest" id="easyTagChips">${tagChips}</div>
      </div>

      ${!user ? `
      <div class="field">
        <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer;text-transform:none;font-size:.86rem;letter-spacing:0;font-weight:400">
          <input type="checkbox" id="easyAnon" ${s.anon?'checked':''} onchange="toggleAnonBlock(this.checked)" style="width:1rem;height:1rem;accent-color:var(--accent)">
          Post anonymously
        </label>
        <div class="anon-block" id="anonBlock" style="${s.anon?'':'display:none'}">
          <div class="field" style="margin-bottom:.9rem"><label>Your name <span style="font-weight:400;text-transform:none">(optional)</span></label>
            <input type="text" id="easyAnonName" placeholder="Leave blank to appear as Anonymous" value="${esc(s.anon_name)}" maxlength="30">
          </div>
          <div class="field" style="margin-bottom:0"><label>Spam check: what is <strong style="color:var(--text)">${s.captcha_a} + ${s.captcha_b}</strong>?</label>
            <input type="text" id="easyCaptcha" placeholder="Type the answer" style="max-width:100px">
          </div>
        </div>
      </div>` : `
      <div class="field">
        <div style="font-size:.82rem;color:var(--muted)">Posting as <strong style="color:var(--text)">${esc(user.username)}</strong></div>
      </div>`}

      ${seriesFieldsHtml(s, !!user)}

      <div class="field">
        <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer;text-transform:none;font-size:.86rem;letter-spacing:0;font-weight:400;color:var(--muted)">
          <input type="checkbox" id="easyNoComments" ${s.comments_disabled?'checked':''} style="width:1rem;height:1rem;accent-color:var(--accent)">
          Disable comments on this story
        </label>
      </div>

      <div class="disclaimer-box"><strong style="color:var(--text)">Before you submit:</strong> ${DISCLAIMER}</div>
      <label style="display:flex;align-items:flex-start;gap:.6rem;cursor:pointer;margin-bottom:1.2rem;font-size:.82rem;color:var(--muted)">
        <input type="checkbox" id="easyDisclaimer" style="width:1rem;height:1rem;margin-top:.15rem;accent-color:var(--accent);flex-shrink:0">
        I understand and agree to the above
      </label>

      <div id="easyError" class="error-msg" style="margin-bottom:.6rem"></div>
      <button class="btn btn-primary" style="width:100%;padding:.8rem" onclick="submitEasyStory()">Share My Story</button>
    </div>`;
  easyWC();

function easyWC() {
  const el = document.getElementById('easyStory');
  const row = document.getElementById('easyWCRow');
  if (!el || !row) return;
  const wc = el.value.trim() ? el.value.trim().split(/\s+/).length : 0;
  const col = wc < 50 ? 'var(--muted)' : wc <= 300 ? 'var(--success)' : 'var(--warn)';
  row.innerHTML = `<span style="color:${col}">${wc} word${wc===1?'':'s'}</span>`;
}

function toggleAnonBlock(on) {
  const el = document.getElementById('anonBlock');
  if (el) el.style.display = on ? '' : 'none';
}

function toggleTag(tag, mode) {
  const inputId = mode === 'easy' ? 'easyTags' : 'subTags';
  const input = document.getElementById(inputId);
  if (!input) return;
  let parts = input.value.split(',').map(t=>t.trim()).filter(Boolean);
  const idx = parts.indexOf(tag);
  if (idx >= 0) parts.splice(idx, 1); else parts.push(tag);
  input.value = parts.join(', ');
  refreshTagChips(mode);
}

function refreshTagChips(mode) {
  const inputId  = mode === 'easy' ? 'easyTags'     : 'subTags';
  const chipsId  = mode === 'easy' ? 'easyTagChips' : 'subTagChips';
  const input    = document.getElementById(inputId);
  const chipsEl  = document.getElementById(chipsId);
  if (!input || !chipsEl) return;
  const selected = input.value.split(',').map(t=>t.trim()).filter(Boolean);
  chipsEl.innerHTML = COMMON_TAGS.map(t => {
    const on = selected.includes(t);
    return `<button type="button" class="tag-chip ${on?'on':''}" onclick="toggleTag('${t}','${mode}')">${t}</button>`;
  }).join('');
}

async function submitEasyStory() {
  const title    = document.getElementById('easyTitle')?.value.trim();
  const genre    = document.getElementById('easyGenre')?.value || '';
  const story    = document.getElementById('easyStory')?.value.trim();
  const tagsRaw  = document.getElementById('easyTags')?.value || '';
  const isAnon   = !user && (document.getElementById('easyAnon')?.checked || false);
  const anonName = document.getElementById('easyAnonName')?.value.trim() || '';
  const captchaVal = document.getElementById('easyCaptcha')?.value.trim();
  const noComments  = document.getElementById('easyNoComments')?.checked || false;
  const disclaimer  = document.getElementById('easyDisclaimer')?.checked || false;
  const err = document.getElementById('easyError');

  if (!title)      { err.textContent = 'Please give your story a title.'; return; }
  if (!story)      { err.textContent = 'Please share your story.'; return; }
  if (!disclaimer) { err.textContent = 'Please accept the disclaimer to continue.'; return; }
  if (isAnon && parseInt(captchaVal) !== submitDraft.captcha_a + submitDraft.captcha_b) {
    err.textContent = `Incorrect answer — please solve the maths check.`; return;
  }

  const tags    = tagsRaw.split(',').map(t=>t.trim()).filter(Boolean);
  const { in_series, series_name, series_part, tbc } = readSeriesFields();
  const payload = { title, genre: genre || 'Other', tags, darkness: story, light: '', light_status: 'searching', comments_disabled: noComments,
    series_name: in_series ? series_name : '', series_part: in_series ? series_part : '', tbc: in_series ? tbc : false, mode: 'quick' };
  if (isAnon) payload.anon_name = anonName;
  err.textContent = '';
  try {
    await api('/api/stories', 'POST', payload);
    submitMode = null; resetDraft();
    toast('Your story has been shared. Thank you for your courage.');
    go('browse');
  } catch(e) { err.textContent = e.message; }
}

// ── Guided Mode ───────────────────────────────────────────
function renderGuidedStep() {
  const s    = submitDraft;
  const STEPS = ['The Basics', 'The Challenge', 'The Experience', 'Review & Share'];

  const progress = `
    <div class="step-progress">
      ${STEPS.map((label, i) => {
        const n = i + 1;
        const cls = n < s.step ? 'done' : n === s.step ? 'active' : '';
        return `<div class="step-item ${cls}">
          <div class="step-dot">${n < s.step ? '✓' : n}</div>
          <div class="step-label">${label}</div>
        </div>`;
      }).join('')}
    </div>`;

  let body = '';
  const catOpts = CATEGORIES.map(g => `<option ${s.genre===g?'selected':''}>${g}</option>`).join('');
  const tip = t => `<div class="tip-box"><span style="color:var(--accent)">💡</span> ${t}</div>`;

  if (s.step === 1) {
    body = `
      <div class="step-heading">The Basics</div>
      <div class="step-desc">Let's start simple — give your story a title and pick a category. That's all we need for now.</div>
      <div class="field"><label>Title *</label>
        <input type="text" id="subTitle" placeholder="What would you call your story?" value="${esc(s.title)}">
      </div>
      <div class="field"><label>Category</label>
        <select id="subGenre"><option value="">— Select a category —</option>${catOpts}</select>
      </div>
      ${seriesFieldsHtml(s, !!user)}
      ${tip('You can always come back and edit your story after publishing.')}`;

  } else if (s.step === 2) {
    body = `
      <div class="step-heading">The Challenge</div>
      <div class="step-desc">Tell us what happened. Be as specific or general as you're comfortable with — there are no wrong answers here.</div>
      <div class="field">
        <label>What challenge did you face? *</label>
        <textarea id="subChallenge" placeholder="Describe what happened…" style="min-height:280px">${esc(s.challenge)}</textarea>
      </div>
      ${tip('Write as much or as little as feels right. This is your story to tell.')}`;

  } else if (s.step === 3) {
    const found = s.light_status === 'found';
    body = `
      <div class="step-heading" style="color:#e96479">The Experience</div>
      <div class="step-desc">Go a little deeper if you'd like — all of these are optional.</div>
      <div class="field">
        <label>How did it feel at the time? <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <textarea id="subFeeling" placeholder="Describe the emotions — the weight of it, the moments that felt impossible…" style="min-height:160px">${esc(s.feeling)}</textarea>
      </div>
      <div style="margin-bottom:1.25rem">
        <label style="margin-bottom:.8rem;display:block">Where are you in your journey?</label>
        <div class="light-toggle">
          <button class="toggle-opt ${found?'sel-found':''}" onclick="setLightStatus('found')">🌅 I've found my light</button>
          <button class="toggle-opt ${!found?'sel-searching':''}" onclick="setLightStatus('searching')">🔍 I'm still searching</button>
        </div>
      </div>
      <div class="field">
        <label>${found ? 'What helped you through it?' : 'What are you holding on to?'} <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <textarea id="subHelped" placeholder="${found ? 'What changed? What helped? What would you tell someone still in the dark?' : 'What keeps you going? What small things bring you comfort or hope?'}" style="min-height:140px">${esc(s.helped)}</textarea>
      </div>
      <div class="field">
        <label>What would you tell someone going through this? <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <textarea id="subAdvice" placeholder="Any words of wisdom, comfort or solidarity for someone facing the same thing…" style="min-height:120px">${esc(s.advice)}</textarea>
      </div>
      ${tip('Sharing your feelings helps others feel less alone in theirs. Everything here is completely optional.')}`;

  } else if (s.step === 4) {
    const darkness_p = [s.challenge, s.feeling].filter(Boolean).join('\n\n');
    const light_p    = [s.helped, s.advice].filter(Boolean).join('\n\n');
    const lightClass = s.light_status === 'found' ? 'light-section' : 'searching-section';
    const lightLabel = s.light_status === 'found' ? '🌅 The Light' : '🔍 Still Searching';
    const tagChips   = COMMON_TAGS.map(t => {
      const on = s.tags.split(',').map(x=>x.trim()).includes(t);
      return `<button type="button" class="tag-chip ${on?'on':''}" onclick="toggleTag('${t}','guided')">${t}</button>`;
    }).join('');
    body = `
      <div class="step-heading">Review & Share</div>
      <div class="step-desc">Take a moment to read your story, add some tags, then share it when you're ready.</div>
      <div class="field">
        <label>Tags <span style="font-weight:400;text-transform:none">(comma-separated)</span></label>
        <input type="text" id="subTags" placeholder="e.g. grief, recovery, hope" value="${esc(s.tags)}" oninput="refreshTagChips('guided')">
        <div class="hint">Tags help others find your story — adding a few gives it better visibility.</div>
        <div style="font-size:.63rem;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin:.7rem 0 .3rem">Click to add a suggestion</div>
        <div class="tag-suggest" id="subTagChips">${tagChips}</div>
      </div>
      <div class="card" style="background:var(--surface2);margin-bottom:1rem">
        <h3 style="margin-bottom:.25rem">${esc(s.title)}</h3>
        <div style="font-size:.76rem;color:var(--muted);margin-bottom:1.2rem">${s.genre || 'No category'}</div>
        ${darkness_p ? `<div class="story-section darkness-section">
          <div class="section-label">🌑 The Darkness</div>
          <div style="font-size:.9rem;line-height:1.75;white-space:pre-wrap;color:#d0d0e0">${esc(darkness_p)}</div>
        </div>` : ''}
        ${light_p ? `<div class="story-section ${lightClass}">
          <div class="section-label">${lightLabel}</div>
          <div style="font-size:.9rem;line-height:1.75;white-space:pre-wrap;color:#d0d0e0">${esc(light_p)}</div>
        </div>` : `<div style="font-size:.82rem;color:var(--muted);padding:.5rem 0">No light section added.</div>`}
      </div>
      <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer;margin-bottom:1.2rem;font-size:.88rem;color:var(--muted)">
        <input type="checkbox" id="subDisableComments" ${s.comments_disabled?'checked':''} style="width:1rem;height:1rem;accent-color:var(--accent)">
        Disable comments on this story
      </label>
      <div class="disclaimer-box"><strong style="color:var(--text)">Before you submit:</strong> ${DISCLAIMER}</div>
      <label style="display:flex;align-items:flex-start;gap:.6rem;cursor:pointer;margin-bottom:1rem;font-size:.82rem;color:var(--muted)">
        <input type="checkbox" id="subDisclaimer" style="width:1rem;height:1rem;margin-top:.15rem;accent-color:var(--accent);flex-shrink:0">
        I understand and agree to the above
      </label>
      <div id="subError" class="error-msg" style="margin-bottom:.5rem"></div>`;
  }

  const isFirst = s.step === 1;
  const isLast  = s.step === 4;

  document.getElementById('app').innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.4rem">
        ${isFirst && !editingStoryId ? `<button class="btn btn-ghost btn-sm" onclick="submitMode=null;render()">← Modes</button>` : ''}
        <div style="flex:1">${progress}</div>
      </div>
      ${body}
      <div class="step-nav">
        ${!isFirst ? `<button class="btn btn-ghost" onclick="guidedBack()">← Back</button>` : '<div></div>'}
        ${isLast
          ? `<button class="btn btn-primary" onclick="submitGuidedStory()">${editingStoryId ? 'Save Changes' : 'Share My Story'}</button>`
          : `<button class="btn btn-primary" onclick="guidedNext()">Continue →</button>`}
      </div>
    </div>`;
  if (s.step === 1 && s.in_series) toggleSeriesFields(true);
}

function seriesFieldsHtml(s, loggedIn) {
  if (!loggedIn) return '';
  return `
    <div class="field">
      <label class="series-toggle-row">
        <input type="checkbox" id="seriesToggle" ${s.in_series ? 'checked' : ''} onchange="toggleSeriesFields(this.checked)" style="width:1rem;height:1rem;accent-color:#a08be0;flex-shrink:0">
        This story is part of a series
      </label>
      <div class="series-fields" id="seriesFields" style="display:none">
        <div style="color:var(--muted);font-size:.8rem">Loading your series…</div>
      </div>
    </div>`;
}

async function toggleSeriesFields(on) {
  submitDraft.in_series = on;
  const el = document.getElementById('seriesFields');
  if (!el) return;
  if (!on) { el.style.display = 'none'; return; }
  el.style.display = '';
  el.innerHTML = '<div style="color:var(--muted);font-size:.8rem">Loading your series…</div>';
  let existingSeries = [];
  try { existingSeries = await api('/api/my-series'); } catch {}
  renderSeriesFields(el, existingSeries);
}

function renderSeriesFields(el, existingSeries) {
  const s = submitDraft;
  const hasExisting = existingSeries.length > 0;
  // Default to first existing series when no series is pre-selected (new story)
  const currentName = s.series_name || (hasExisting ? existingSeries[0] : '');
  const isNew = !currentName || !existingSeries.includes(currentName);

  const selectHtml = hasExisting ? `
    <div class="field" style="margin-bottom:.9rem">
      <label>Series</label>
      <select id="seriesSelect" onchange="onSeriesSelectChange(this.value)">
        ${existingSeries.map(n => `<option value="${esc(n)}" ${n === currentName ? 'selected' : ''}>${esc(n)}</option>`).join('')}
        <option value="__new__" ${isNew ? 'selected' : ''}>➕ Start a new series…</option>
      </select>
    </div>
    <div class="field" id="newSeriesNameField" style="${isNew ? '' : 'display:none'}margin-bottom:.9rem">
      <label>New Series Name</label>
      <input type="text" id="newSeriesNameInput" placeholder="e.g. My Road Back" value="${isNew ? esc(currentName) : ''}" maxlength="60">
    </div>` : `
    <div class="field" style="margin-bottom:.9rem">
      <label>Series Name</label>
      <input type="text" id="newSeriesNameInput" placeholder="e.g. My Road Back" value="${esc(currentName)}" maxlength="60">
    </div>`;

  el.innerHTML = `
    ${selectHtml}
    <div style="display:flex;gap:.8rem;align-items:flex-end">
      <div class="field" style="margin-bottom:0">
        <label>Part Number</label>
        <input type="number" id="seriesPart" placeholder="1" value="${s.series_part || ''}" min="1" max="999" style="max-width:100px">
      </div>
      <div class="field" style="margin-bottom:.15rem">
        <label class="series-toggle-row">
          <input type="checkbox" id="seriesTbc" ${s.tbc ? 'checked' : ''} style="width:1rem;height:1rem;accent-color:var(--warn);flex-shrink:0">
          Mark as "To Be Continued"
        </label>
      </div>
    </div>`;

  // Auto-fill next part for an existing series (skip if editing — part already set)
  if (hasExisting && !isNew && !s.series_part) onSeriesSelectChange(currentName);
}

async function onSeriesSelectChange(val) {
  const newField = document.getElementById('newSeriesNameField');
  const partEl   = document.getElementById('seriesPart');
  if (val === '__new__') {
    if (newField) { newField.style.display = ''; document.getElementById('newSeriesNameInput')?.focus(); }
    if (partEl && !partEl.value) partEl.value = 1;
  } else {
    if (newField) newField.style.display = 'none';
    if (partEl && user) {
      try {
        const parts   = await api(`/api/series?name=${encodeURIComponent(val)}&author_id=${encodeURIComponent(user.id)}`);
        const maxPart = Math.max(parts.length, ...parts.map(p => p.series_part || 0));
        partEl.value  = maxPart + 1;
        submitDraft.series_part = String(maxPart + 1);
      } catch {}
    }
  }
}

function readSeriesFields() {
  const toggle = document.getElementById('seriesToggle');
  if (!toggle || !toggle.checked) return { in_series: false, series_name: '', series_part: '', tbc: false };
  const selectEl  = document.getElementById('seriesSelect');
  const series_name = selectEl
    ? (selectEl.value === '__new__' ? (document.getElementById('newSeriesNameInput')?.value.trim() || '') : selectEl.value)
    : (document.getElementById('newSeriesNameInput')?.value.trim() || '');
  return {
    in_series:   true,
    series_name,
    series_part: document.getElementById('seriesPart')?.value || submitDraft.series_part || '1',
    tbc:         document.getElementById('seriesTbc')?.checked || false,
  };
}

function setLightStatus(status) {
  const el = document.getElementById('subFeeling');
  if (el) submitDraft.feeling = el.value;
  submitDraft.light_status = status;
  renderGuidedStep();
}

function guidedNext() {
  const s = submitDraft;
  if (s.step === 1) {
    s.title = document.getElementById('subTitle').value.trim();
    s.genre = document.getElementById('subGenre').value;
    Object.assign(s, readSeriesFields());
    if (!s.title) { toast('Please give your story a title.', 'err'); return; }
  } else if (s.step === 2) {
    s.challenge = document.getElementById('subChallenge').value.trim();
    if (!s.challenge) { toast('Please describe the challenge you faced.', 'err'); return; }
  } else if (s.step === 3) {
    s.feeling = document.getElementById('subFeeling')?.value.trim() || '';
    s.helped  = document.getElementById('subHelped')?.value.trim()  || '';
    s.advice  = document.getElementById('subAdvice')?.value.trim()  || '';
  }
  s.step++;
  renderGuidedStep();
  window.scrollTo(0, 0);
}

function guidedBack() {
  const s = submitDraft;
  if (s.step === 2) s.challenge = document.getElementById('subChallenge')?.value ?? s.challenge;
  if (s.step === 3) {
    s.feeling = document.getElementById('subFeeling')?.value ?? s.feeling;
    s.helped  = document.getElementById('subHelped')?.value  ?? s.helped;
    s.advice  = document.getElementById('subAdvice')?.value  ?? s.advice;
  }
  if (s.step === 4) s.tags = document.getElementById('subTags')?.value ?? s.tags;
  if (s.step === 1 && !editingStoryId) { submitMode = null; render(); return; }
  s.step--;
  renderGuidedStep();
  window.scrollTo(0, 0);
}

async function editStory(id) {
  try {
    const s = await api(`/api/stories/${id}`);
    editingStoryId = id;
    submitMode = 'guided';
    submitDraft = {
      step: 1, title: s.title, genre: s.genre || '',
      tags: (s.tags || []).join(', '),
      challenge: s.darkness || s.body || '', feeling: '',
      helped: s.light || '', advice: '',
      light_status: s.light_status || 'searching',
      story: '', anon: false, anon_name: '', captcha_a: 0, captcha_b: 0,
      comments_disabled: s.comments_disabled || false,
      in_series: !!s.series_name,
      series_name: s.series_name || '',
      series_part: s.series_part || '',
      tbc: s.tbc || false,
    };
    go('submit');
  } catch(e) { toast(e.message, 'err'); }
}

async function submitGuidedStory() {
  const s = submitDraft;
  s.tags             = document.getElementById('subTags')?.value || s.tags;
  s.comments_disabled = document.getElementById('subDisableComments')?.checked || false;
  const disclaimer   = document.getElementById('subDisclaimer')?.checked || false;
  const err          = document.getElementById('subError');
  if (!disclaimer) { err.textContent = 'Please accept the disclaimer to continue.'; return; }

  const darkness = [s.challenge, s.feeling].filter(Boolean).join('\n\n');
  const light    = [s.helped, s.advice].filter(Boolean).join('\n\n');
  const tags     = s.tags.split(',').map(t=>t.trim()).filter(Boolean);
  const payload  = { title: s.title, genre: s.genre || 'Other', tags, darkness, light, light_status: s.light_status, comments_disabled: s.comments_disabled,
    series_name: s.in_series ? s.series_name : '', series_part: s.in_series ? s.series_part : '', tbc: s.in_series ? s.tbc : false, mode: 'guided' };
  try {
    if (editingStoryId) {
      await api(`/api/stories/${editingStoryId}`, 'PATCH', payload);
      editingStoryId = null; submitMode = null; resetDraft();
      toast('Story updated.');
      go('mine');
    } else {
      await api('/api/stories', 'POST', payload);
      submitMode = null; resetDraft();
      toast('Your story has been shared. Thank you for your courage.');
      go('browse');
    }
  } catch(e) { if (err) err.textContent = e.message; }
}
